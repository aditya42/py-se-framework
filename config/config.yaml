browser:
  name: chrome
  headless: true
  window_width: 1440
  window_height: 1000
  explicit_wait: 10
  page_load_timeout: 30
  screenshot_on_failure: true

ai:
  enabled: false
  provider: openai
  model: gpt-5-mini
  healing_mode: suggest_only
  max_dom_chars: 25000
  artifacts_dir: reports/ai

execution:
  base_url: ""
  environment: local
